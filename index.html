<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>MEL Video Save 轉換器</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{color-scheme:dark;--bg:#0e1116;--panel:#171c24;--line:#2a3340;--text:#f5f7fa;--muted:#aab4c2;--accent:#8fa3bf;--danger:#ff7b7b}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#1b2330 0,#0e1116 42%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;min-height:100vh}
main{width:min(980px,100%);margin:auto;padding:28px 16px 60px}.title{font-size:clamp(28px,5vw,46px);font-weight:800;letter-spacing:-.03em;margin:8px 0}.sub{color:var(--muted);line-height:1.65;margin:0 0 22px}
.card{background:rgba(23,28,36,.92);border:1px solid var(--line);border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 18px 50px rgba(0,0,0,.2)}
label{display:block;font-weight:700;margin:0 0 8px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.full{grid-column:1/-1}
input,select,button{width:100%;font:inherit;border-radius:12px;border:1px solid var(--line);background:#10151c;color:var(--text);padding:12px 13px} input[type=file]{padding:10px} input[type=range]{padding:8px 0}
button{background:linear-gradient(135deg,#7f91aa,#a7b4c6);color:#0d1117;font-weight:850;border:0;cursor:pointer;min-height:48px}button:disabled{opacity:.45;cursor:not-allowed}.secondary{background:#202833;color:var(--text);border:1px solid var(--line)}
small,.hint{color:var(--muted);line-height:1.55}.preview{display:flex;justify-content:center;align-items:center;min-height:210px;background:#090c10;border:1px solid var(--line);border-radius:14px;overflow:hidden}.preview canvas{width:min(100%,640px);image-rendering:pixelated;aspect-ratio:16/9;background:#000}
.progress{height:12px;background:#0b0f14;border:1px solid var(--line);border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#879bb7,#d4dde9);transition:width .12s linear}.status{margin-top:9px;color:var(--muted);white-space:pre-wrap}.warn{color:#ffd27d}.error{color:var(--danger)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:#11161d;border:1px solid var(--line);border-radius:12px;padding:10px}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}
@media(max-width:680px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body><main>
<div class="title">MEL 影片存檔轉換器</div>
<p class="sub">上傳 MP4／MOV／WebM，瀏覽器會逐幀縮圖、轉成 4096 色中文字資料，並保留原本的地圖、LED 矩陣與接線，只替換 Lua 裡的影片內容。</p>

<div class="card grid">
<div class="full"><label>影片檔案</label><input id="videoFile" type="file" accept="video/*,.mp4,.mov,.webm,.m4v" /></div>
<div><label>輸出解析度</label><select id="resolution"><option value="48x27" selected>48 × 27（較快，原 mc 格式）</option><option value="64x36">64 × 36（較清楚，負擔較高）</option><option value="32x18">32 × 18（最省效能）</option></select></div>
<div><label>輸出 FPS</label><select id="fps"><option>10</option><option selected>15</option><option>20</option><option>24</option><option>30</option></select></div>
<div><label>畫面填充</label><select id="fit"><option value="contain" selected>完整顯示（可能有黑邊）</option><option value="cover">裁切填滿</option><option value="stretch">拉伸填滿</option></select></div>
<div><label>最長轉換秒數</label><input id="maxSeconds" type="number" min="1" max="120" value="15" /></div>
<div class="full"><label>存檔名稱</label><input id="name" type="text" value="video mp4" maxlength="40" /></div>
</div>

<div class="card">
<div class="preview"><canvas id="preview" width="480" height="270"></canvas></div>
<div class="stats" style="margin-top:12px">
<div class="stat"><b id="durationStat">—</b><span>影片秒數</span></div><div class="stat"><b id="framesStat">—</b><span>輸出影格</span></div><div class="stat"><b id="pixelsStat">—</b><span>每幀像素</span></div><div class="stat"><b id="charsStat">—</b><span>預估資料字元</span></div>
</div>
</div>

<div class="card">
<button id="convert" disabled>生成 .melsave</button>
<div class="progress" style="margin-top:14px"><div id="bar" class="bar"></div></div>
<div id="status" class="status">請先選擇影片。</div>
</div>

<div class="card hint"><b>注意：</b>影片越長、解析度越高，Lua 字串和存檔就越大。64×36 每幀有 2304 個像素，對遊戲和手機的負擔約為 48×27 的 1.78 倍。此工具不會上傳影片，轉換全在本機瀏覽器完成。</div>

<video id="video" muted playsinline preload="metadata" style="display:none"></video>
<canvas id="work" style="display:none"></canvas>
</main>

const $=id=>document.getElementById(id);
const fileInput=$('videoFile'), video=$('video'), work=$('work'), preview=$('preview');
let videoURL=null, duration=0;

function b64ToUint8(b64){const bin=atob(b64),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function once(el,event){return new Promise((resolve,reject)=>{const ok=()=>{cleanup();resolve()},bad=()=>{cleanup();reject(new Error('影片解碼失敗'))},cleanup=()=>{el.removeEventListener(event,ok);el.removeEventListener('error',bad)};el.addEventListener(event,ok,{once:true});el.addEventListener('error',bad,{once:true})})}
async function seekTo(t){if(Math.abs(video.currentTime-t)<0.0005)return;const p=once(video,'seeked');video.currentTime=Math.min(t,Math.max(0,video.duration-0.001));await p}
function settings(){const [w,h]=$('resolution').value.split('x').map(Number);const fps=Number($('fps').value);const max=Math.max(1,Number($('maxSeconds').value)||15);const used=Math.min(duration||0,max);return {w,h,fps,max,used,frames:Math.max(1,Math.floor(used*fps)),pixels:w*h}}
function updateStats(){const s=settings();$('durationStat').textContent=duration?duration.toFixed(2):'—';$('framesStat').textContent=duration?s.frames.toLocaleString():'—';$('pixelsStat').textContent=s.pixels.toLocaleString();$('charsStat').textContent=duration?(s.frames*s.pixels).toLocaleString():'—'}
function drawFrame(ctx,w,h,fit){ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);const vw=video.videoWidth,vh=video.videoHeight;if(!vw||!vh)return;if(fit==='stretch'){ctx.drawImage(video,0,0,w,h);return}const scale=fit==='cover'?Math.max(w/vw,h/vh):Math.min(w/vw,h/vh);const dw=vw*scale,dh=vh*scale;ctx.drawImage(video,(w-dw)/2,(h-dh)/2,dw,dh)}
function renderPreview(){if(!duration)return;const ctx=preview.getContext('2d');drawFrame(ctx,preview.width,preview.height,$('fit').value)}
['resolution','fps','fit','maxSeconds'].forEach(id=>$(id).addEventListener('change',()=>{updateStats();renderPreview()}));
fileInput.addEventListener('change',async()=>{const f=fileInput.files[0];if(!f)return;if(videoURL)URL.revokeObjectURL(videoURL);videoURL=URL.createObjectURL(f);video.src=videoURL;$('status').textContent='正在讀取影片…';try{await once(video,'loadedmetadata');duration=video.duration;if(!Number.isFinite(duration)||duration<=0)throw new Error('無法讀取影片長度');await seekTo(0);renderPreview();updateStats();$('convert').disabled=false;$('name').value=(f.name.replace(/\.[^.]+$/,'')||'video')+' mp4';$('status').textContent='影片已載入，可以開始生成。'}catch(e){$('status').className='status error';$('status').textContent=e.message;$('convert').disabled=true}});

function findLuaSlot(root){let found=null;function walk(x){if(found)return;if(Array.isArray(x)){for(const v of x)walk(v)}else if(x&&typeof x==='object'){for(const [k,v] of Object.entries(x)){if(k==='stringValue'&&typeof v==='string'&&v.includes('function OnTick()')&&v.includes('outputs.array_vec.led')){found={obj:x,key:k,value:v};return}walk(v)}}}walk(root);return found}
function extractPalette(lua){const m=lua.match(/^w="([\s\S]*?)"\ns="/);if(!m)throw new Error('找不到模板調色盤');return m[1]}
function luaQuote(s){return '"'+s.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\r/g,'\\r').replace(/\n/g,'\\n')+'"'}
function buildLua(palette,data,pixels){return `w=${luaQuote(palette)}\ns=${luaQuote(data)}\ni=string.len(s) / ${pixels}\nf=1\nfunction wio(fs)\n leds={}\n for e=1,${pixels} do\n rbg= string.find(w,string.sub(fs,e,e)) - 1\n r=rbg % 16 /15\n b=math.floor(rbg / 16) % 16 /15\n g=math.floor(rbg / 256) % 16 /15\n leds[e]={x=r,y=b,z=g,w=1}\n end\nreturn(leds)\nend\n\nfunction OnTick()\noutputs.array_vec.led = wio(string.sub(s,f,f+${pixels-1}))\nf=f+${pixels}\ny=f/${pixels}\noutputs.string.i = tostring(math.floor(y)) .. "/" .. tostring(i)\n if y > i then\n f=1\n end\nend`}
function rgbToIndex(r,g,b){const R=Math.round(r/255*15),G=Math.round(g/255*15),B=Math.round(b/255*15);return R+B*16+G*256}
function safeName(s){return (s||'video mp4').replace(/[\\/:*?"<>|]/g,'_').trim()||'video mp4'}
function uuid(){return crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&3|8);return v.toString(16)})}

$('convert').addEventListener('click',async()=>{const btn=$('convert');btn.disabled=true;$('status').className='status';$('bar').style.width='0%';try{
if(typeof JSZip==='undefined')throw new Error('JSZip 載入失敗，請確認目前有網路後重新整理頁面。');
const s=settings();work.width=s.w;work.height=s.h;const ctx=work.getContext('2d',{willReadFrequently:true});
$('status').textContent=`準備轉換 ${s.frames} 幀…`;
const zip=await JSZip.loadAsync(b64ToUint8(TEMPLATE_B64));const dataText=await zip.file('Data').async('string');const dataObj=JSON.parse(dataText);const slot=findLuaSlot(dataObj);if(!slot)throw new Error('模板中找不到 Lua 播放器');const palette=extractPalette(slot.value);if([...palette].length<4096)throw new Error('模板調色盤不足 4096 色');const pal=[...palette];
let chunks=new Array(s.frames);for(let frame=0;frame<s.frames;frame++){
 const t=frame/s.fps;await seekTo(t);drawFrame(ctx,s.w,s.h,$('fit').value);const img=ctx.getImageData(0,0,s.w,s.h).data;let chars=new Array(s.pixels);for(let p=0,j=0;p<img.length;p+=4,j++)chars[j]=pal[rgbToIndex(img[p],img[p+1],img[p+2])];chunks[frame]=chars.join('');
 if(frame%3===0||frame===s.frames-1){const pct=(frame+1)/s.frames*82;$('bar').style.width=pct.toFixed(1)+'%';$('status').textContent=`轉換影格 ${frame+1} / ${s.frames}`;await sleep(0)}
}
const encoded=chunks.join('');slot.obj[slot.key]=buildLua(palette,encoded,s.pixels);
const meta=JSON.parse(await zip.file('MetaData').async('string'));const name=safeName($('name').value);meta.UniqueId=uuid();meta.category=name;meta.CategoryValidated=name;zip.file('MetaData',JSON.stringify(meta));zip.file('Data',JSON.stringify(dataObj));
$('bar').style.width='88%';$('status').textContent='正在封裝存檔…';const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}},m=>{$('bar').style.width=(88+m.percent*.12)+'%'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.melsave';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),30000);$('bar').style.width='100%';$('status').textContent=`完成：${name}.melsave\n解析度 ${s.w}×${s.h}｜${s.frames} 幀｜影片資料 ${encoded.length.toLocaleString()} 字元`;
}catch(e){console.error(e);$('status').className='status error';$('status').textContent='生成失敗：'+(e.message||e)}finally{btn.disabled=false}});
updateStats();
</script></body></html>
